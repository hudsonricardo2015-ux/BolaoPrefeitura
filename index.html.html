<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bolão do Brasil - Copa do Mundo 2026</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- EXCEL -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:
linear-gradient(180deg,#009739,#002776);
min-height:100vh;
color:white;
padding:20px;
}

.container{
max-width:1450px;
margin:auto;
display:grid;
grid-template-columns:1fr 360px;
gap:20px;
}

@media(max-width:1000px){

.container{
grid-template-columns:1fr;
}

}

.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:22px;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
text-align:center;
font-size:42px;
margin-bottom:15px;
color:#FFDF00;
}

.sub{
text-align:center;
margin-bottom:25px;
font-size:18px;
}

input,
button,
select{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
}

button{
background:#FFDF00;
color:#002776;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
transform:scale(1.02);
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

@media(max-width:700px){

.grid2{
grid-template-columns:1fr;
}

}

.valor{
margin-top:20px;
font-size:24px;
text-align:center;
font-weight:bold;
color:#FFDF00;
}

.pix-box{
margin-top:25px;
text-align:center;
}

.pix-box h3{
margin-bottom:10px;
color:#FFDF00;
}

.pix-numero{
font-size:24px;
font-weight:bold;
}

.qrcode{
margin-top:20px;
text-align:center;
}

.qrcode img{
border-radius:12px;
background:white;
padding:10px;
}

.table{
width:100%;
border-collapse:collapse;
margin-top:25px;
overflow:hidden;
border-radius:15px;
}

.table th{
background:#FFDF00;
color:#002776;
padding:14px;
}

.table td{
background:rgba(255,255,255,0.12);
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
color:#FFDF00;
margin-bottom:20px;
text-align:center;
}

.jogo{
background:rgba(255,255,255,0.1);
padding:18px;
border-radius:15px;
margin-bottom:15px;
border-left:5px solid #FFDF00;
}

.jogo h3{
color:#FFDF00;
margin-bottom:10px;
}

.contador{
margin-top:12px;
background:#FFDF00;
color:#002776;
padding:10px;
border-radius:10px;
font-weight:bold;
text-align:center;
}

.admin{
margin-top:35px;
padding-top:25px;
border-top:2px solid rgba(255,255,255,0.2);
}

.ranking-item{
background:rgba(255,255,255,0.1);
padding:12px;
border-radius:12px;
margin-top:10px;
}

.export-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.alerta{
background:#c62828;
padding:12px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div>

<div class="card">

<h1>🇧🇷 BOLÃO DO BRASIL 🇧🇷</h1>

<div class="sub">
Copa do Mundo FIFA 2026
</div>

<div class="alerta">
⚠️ Apostas encerram automaticamente 1 hora antes do jogo
</div>

<form id="formBolao">

<input
type="text"
id="nome"
placeholder="Nome do funcionário"
required
>

<select id="jogoSelect">

</select>

<div class="grid2">

<input
type="number"
id="golsBrasil"
placeholder="Gols Brasil"
required
>

<input
type="number"
id="golsAdversario"
placeholder="Gols Adversário"
required
>

</div>

<input
type="text"
id="pix"
placeholder="Seu PIX caso ganhe"
required
>

<button type="submit">
Registrar Aposta
</button>

</form>

<div class="valor">
💰 Valor da aposta: R$ 5,00
</div>

<div class="pix-box">

<h3>PIX PARA PAGAMENTO</h3>

<div class="pix-numero">
062.535.691-80
</div>

<div class="qrcode">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=062.535.691-80"
width="220"
>

</div>

</div>

<div class="export-buttons">

<button onclick="exportarPDF()">
Exportar PDF
</button>

<button onclick="exportarExcel()">
Exportar Excel
</button>

</div>

<table class="table">

<thead>

<tr>
<th>Nome</th>
<th>Jogo</th>
<th>Placar</th>
<th>PIX</th>
</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

<div class="admin">

<h2>
🔒 Painel Administrativo
</h2>

<input
type="password"
id="senhaAdmin"
placeholder="Senha administrador"
>

<button onclick="abrirAdmin()">
Entrar Painel
</button>

<div
id="painelAdmin"
style="display:none;"
>

<h2 style="margin-top:20px;">
🏆 Ranking
</h2>

<div id="ranking"></div>

</div>

</div>

</div>

</div>

<!-- LATERAL -->

<div class="sidebar">

<div class="card">

<h2>
📅 Jogos do Brasil
</h2>

<div id="listaJogos">

</div>

</div>

</div>

</div>

<script>

// =====================================
// FIREBASE CONFIG
// =====================================

const firebaseConfig = {

apiKey: "AIzaSyC_O9wHsxK9chWOj8DojP0VgfO_T4PMEt4",

authDomain: "apostasprefeiturabrasil.firebaseapp.com",

projectId: "apostasprefeiturabrasil",

storageBucket: "apostasprefeiturabrasil.firebasestorage.app",

messagingSenderId: "262464905846",

appId: "1:262464905846:web:aaf4eb9035166423777557",

measurementId: "G-JFRTZ61TFW"

};

// INICIAR FIREBASE

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// =====================================
// JOGOS DO BRASIL
// =====================================

const jogos = [

{
id:1,
texto:"Brasil x Marrocos 🇲🇦",
data:"2026-06-13T19:00:00"
},

{
id:2,
texto:"Brasil x Haiti 🇭🇹",
data:"2026-06-19T22:00:00"
},

{
id:3,
texto:"Brasil x Escócia 🏴",
data:"2026-06-24T19:00:00"
}

];

// =====================================
// EXIBIR JOGOS
// =====================================

const jogoSelect =
document.getElementById("jogoSelect");

const listaJogos =
document.getElementById("listaJogos");

jogos.forEach(jogo=>{

jogoSelect.innerHTML += `

<option value="${jogo.texto}">
${jogo.texto}
</option>

`;

listaJogos.innerHTML += `

<div class="jogo">

<h3>${jogo.texto}</h3>

<p>
📅
${new Date(jogo.data)
.toLocaleDateString("pt-BR")}
</p>

<p>
⏰
${new Date(jogo.data)
.toLocaleTimeString("pt-BR")}
</p>

<div
class="contador"
id="contador-${jogo.id}"
>

</div>

</div>

`;

});

// =====================================
// CONTADOR
// =====================================

function atualizarContador(){

jogos.forEach(jogo=>{

const agora = new Date();

const data =
new Date(jogo.data);

const diff = data - agora;

const el =
document.getElementById(
`contador-${jogo.id}`
);

if(diff <= 0){

el.innerHTML =
"⚽ Jogo iniciado";

return;

}

const dias =
Math.floor(diff/(1000*60*60*24));

const horas =
Math.floor((diff/(1000*60*60))%24);

const minutos =
Math.floor((diff/(1000*60))%60);

el.innerHTML =
`⏳ ${dias}d ${horas}h ${minutos}min`;

});

}

setInterval(atualizarContador,1000);

atualizarContador();

// =====================================
// REGISTRAR APOSTA
// =====================================

const form =
document.getElementById("formBolao");

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

const jogoTexto =
jogoSelect.value;

const jogoAtual =
jogos.find(
j=>j.texto===jogoTexto
);

const limite =
new Date(
new Date(jogoAtual.data)
.getTime() - (60*60*1000)
);

if(new Date() >= limite){

alert(
"Apostas encerradas para este jogo."
);

return;

}

const aposta = {

nome:
document.getElementById("nome").value,

jogo:jogoTexto,

brasil:
document.getElementById("golsBrasil").value,

adversario:
document.getElementById("golsAdversario").value,

pix:
document.getElementById("pix").value,

pontos:0,

criado:
new Date()

};

await db
.collection("apostas")
.add(aposta);

alert(
"Aposta registrada com sucesso!"
);

form.reset();

carregarApostas();

});

// =====================================
// CARREGAR APOSTAS
// =====================================

async function carregarApostas(){

const tabela =
document.getElementById("tabela");

tabela.innerHTML = "";

const snapshot =
await db.collection("apostas").get();

snapshot.forEach(doc=>{

const a = doc.data();

tabela.innerHTML += `

<tr>

<td>${a.nome}</td>

<td>${a.jogo}</td>

<td>
${a.brasil} x ${a.adversario}
</td>

<td>${a.pix}</td>

</tr>

`;

});

}

carregarApostas();

// =====================================
// ADMIN
// =====================================

function abrirAdmin(){

const senha =
document.getElementById("senhaAdmin").value;

if(senha !== "admin123"){

alert("Senha incorreta");

return;

}

document.getElementById(
"painelAdmin"
).style.display = "block";

carregarRanking();

}

// =====================================
// RANKING
// =====================================

async function carregarRanking(){

const ranking =
document.getElementById("ranking");

ranking.innerHTML = "";

const snapshot =
await db
.collection("apostas")
.orderBy("pontos","desc")
.get();

snapshot.forEach(doc=>{

const a = doc.data();

ranking.innerHTML += `

<div class="ranking-item">

🏆 ${a.nome}
-
${a.pontos} pontos

</div>

`;

});

}

// =====================================
// EXPORTAR PDF
// =====================================

async function exportarPDF(){

const { jsPDF } = window.jspdf;

const doc = new jsPDF();

const snapshot =
await db.collection("apostas").get();

let y = 20;

doc.text(
"Relatório de Apostas",
20,
y
);

y += 20;

snapshot.forEach(d=>{

const a = d.data();

doc.text(
`${a.nome} | ${a.jogo} | ${a.brasil}x${a.adversario}`,
20,
y
);

y += 10;

});

doc.save("apostas.pdf");

}

// =====================================
// EXPORTAR EXCEL
// =====================================

async function exportarExcel(){

const snapshot =
await db.collection("apostas").get();

let dados = [];

snapshot.forEach(d=>{

dados.push(d.data());

});

const ws =
XLSX.utils.json_to_sheet(dados);

const wb =
XLSX.utils.book_new();

XLSX.utils.book_append_sheet(
wb,
ws,
"Apostas"
);

XLSX.writeFile(
wb,
"apostas.xlsx"
);

}

</script>

</body>
</html>
